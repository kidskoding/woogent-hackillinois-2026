# Run this workflow from the Actions tab when you need to refresh product
# descriptions (and sample data) in production without a full deploy.
name: Refresh production products

on:
  workflow_dispatch:

jobs:
  refresh-products:
    runs-on: ubuntu-latest
    steps:
      - name: Re-import products on production
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ~/woogent
            git remote prune origin 2>/dev/null || true
            git fetch origin master
            git reset --hard FETCH_HEAD
            echo "Running wpcli to patch descriptions and images (no reimport)..."
            docker compose run --rm wpcli
            echo "Product refresh complete."
